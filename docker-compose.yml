# ─────────────────────────────────────────────────────────────
#  docker-compose.yml — Financial Simulation Engine
#
#  Usage:
#    docker compose up --build -d
#    docker compose up --build --scale app=3  # horizontal scaling
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///data/simulation.db
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  app-data:
